services:
  - type: web
    name: my-memory-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
    disk:
      name: bot-data
      mountPath: /opt/render/project/src/files
      sizeGB: 1
      
