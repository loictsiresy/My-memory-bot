services:
  - type: web
    name: my-memory-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: PORT
        value: 10000
    disk:
      name: bot-data
      mountPath: /opt/render/project/src/files
      sizeGB: 1
      
